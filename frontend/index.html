<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoRubric AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  transition: background 0.3s ease, color 0.3s ease;
}

/* Light / Dark backgrounds */
body.light {
  background: #f5f7fa;
  color: #111827;
}
body.dark {
  background: #0b1220;
  color: #e5e7eb;
}

/* Container */
.container-box {
  max-width: 900px;
  margin: auto;
}

/* Card */
.card {
  background: white;
  border-radius: 14px;
  padding: 20px;
  border: 1px solid #e5e7eb;
  transition: all 0.3s ease;
}
.dark .card {
  background: #111827;
  border-color: #1f2937;
}

/* Inputs */
.input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  background: white;
  color: black;
}
.dark .input {
  background: #020617;
  color: white;
  border-color: #374151;
}

/* Button */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: #111827;
  color: white;
  transition: 0.2s;
}
.btn:hover {
  background: #1f2937;
}

/* Scroll panels */
.scroll-box {
  max-height: 160px;
  overflow-y: auto;
}

/* Reveal animation */
.reveal {
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
}
.reveal.show {
  opacity: 1;
  transform: translateY(0);
}

/* Loader */
.loader {
  width: 26px;
  height: 26px;
  border: 3px solid #d1d5db;
  border-top: 3px solid #111827;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="light p-6">

<div class="container-box">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-xl font-semibold">AutoRubric AI</h1>

  <button onclick="toggleTheme()" class="text-sm border px-3 py-1 rounded">
    Toggle Theme
  </button>
</div>

<!-- INPUT -->
<div class="card mb-4">
  <textarea id="prompt" placeholder="Enter prompt"
  class="input mb-3"></textarea>

  <textarea id="answer" placeholder="Enter answer"
  class="input mb-3"></textarea>

  <button onclick="runEvaluation()" class="btn">
    Evaluate
  </button>
</div>

<!-- LOADING -->
<div id="loading" class="hidden text-center mt-4">
  <div class="loader mx-auto"></div>
  <p class="text-sm mt-2 text-gray-500">Processing</p>
</div>

<!-- RESULTS -->
<div id="result" class="hidden mt-6 space-y-4">

  <!-- SCORE -->
  <div class="card reveal text-center">
    <canvas id="scoreRing" width="120" height="120"></canvas>
    <p id="scoreText" class="mt-2 font-medium"></p>
  </div>

  <!-- CHART -->
  <div class="card reveal">
    <canvas id="radarChart"></canvas>
  </div>

  <!-- FEEDBACK -->
  <div class="card reveal scroll-box">
    <h3 class="text-sm font-medium mb-2">Feedback</h3>
    <p id="feedback" class="text-sm"></p>
  </div>

  <!-- REASONING -->
  <div class="card reveal scroll-box">
    <h3 class="text-sm font-medium mb-2">Reasoning</h3>
    <ul id="reasoning" class="text-sm space-y-1"></ul>
  </div>

  <!-- RUBRIC -->
  <div class="card reveal scroll-box">
    <h3 class="text-sm font-medium mb-2">Rubric</h3>
    <pre id="rubric" class="text-sm whitespace-pre-wrap"></pre>
  </div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
