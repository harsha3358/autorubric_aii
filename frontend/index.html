<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoRubric AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
  transition: all 0.3s ease;
}

/* Background */
body.light {
  background: linear-gradient(135deg, #f8fafc, #eef2f7);
}
body.dark {
  background: linear-gradient(135deg, #0f172a, #020617);
}

/* Glass */
.glass {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.dark .glass {
  background: rgba(30,41,59,0.6);
  color: white;
}

/* Scroll */
.scroll-box {
  max-height: 160px;
  overflow-y: auto;
}

/* Reveal */
.reveal {
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.5s ease;
}
.reveal.show {
  opacity: 1;
  transform: translateY(0);
}

/* Loader */
.loader {
  border: 4px solid #e5e7eb;
  border-top: 4px solid #6366f1;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body class="light flex justify-center items-center min-h-screen p-6">

<div class="w-full max-w-3xl glass p-8">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">
  <h1 class="text-2xl font-semibold">
    AutoRubric AI 🍎
  </h1>

  <button onclick="toggleTheme()"
    class="px-3 py-1 rounded-full bg-gray-200 dark:bg-gray-700">
    🌗
  </button>
</div>

<!-- INPUTS -->
<textarea id="prompt" placeholder="Enter assignment prompt..."
class="w-full p-3 border rounded mb-3 
bg-white text-black 
dark:bg-gray-800 dark:text-white 
placeholder-gray-400 
focus:outline-none focus:ring-2 focus:ring-indigo-400">
</textarea>

<textarea id="answer" placeholder="Enter student answer..."
class="w-full p-3 border rounded mb-3 
bg-white text-black 
dark:bg-gray-800 dark:text-white 
placeholder-gray-400 
focus:outline-none focus:ring-2 focus:ring-indigo-400">
</textarea>

<button onclick="runEvaluation()"
class="w-full bg-indigo-500 text-white py-2 rounded transition active:scale-95">
Evaluate
</button>

<!-- Loader -->
<div id="loading" class="hidden mt-4 flex flex-col items-center">
<div class="loader"></div>
<p class="mt-2 text-gray-500">Thinking...</p>
</div>

<!-- RESULT -->
<div id="result" class="hidden mt-6 space-y-4">

<!-- Score -->
<div class="glass p-4 reveal text-center">
<canvas id="scoreRing" width="120" height="120"></canvas>
<p id="scoreText" class="mt-2 font-semibold text-indigo-600"></p>
</div>

<!-- Radar -->
<div class="glass p-4 reveal">
<canvas id="radarChart"></canvas>
</div>

<!-- Feedback -->
<div class="glass p-4 scroll-box reveal">
<p id="feedback"></p>
</div>

<!-- Reasoning -->
<div class="glass p-4 scroll-box reveal">
<ul id="reasoning"></ul>
</div>

<!-- Rubric -->
<div class="glass p-4 scroll-box reveal">
<pre id="rubric"></pre>
</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
